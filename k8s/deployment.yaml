apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
  labels:
    app: flask-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-api
  template:
    metadata:
      labels:
        app: flask-api
    spec:
      containers:
        - name: flask-api
          image: reddysaab/flask-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATA_FILE
              valueFrom:
                configMapKeyRef:
                  name: flask-api-config
                  key: DATA_FILE
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: data-storage
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data-storage
          persistentVolumeClaim:
            claimName: flask-api-pvc
