steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'docker.io/reddysaab/flask-api:$COMMIT_SHA', '-t', 'docker.io/reddysaab/flask-api:latest', '.']
    id: 'build-image'

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker login -u reddysaab -p $$DOCKERHUB_PASSWORD && docker push docker.io/reddysaab/flask-api:$COMMIT_SHA && docker push docker.io/reddysaab/flask-api:latest']
    secretEnv: ['DOCKERHUB_PASSWORD']
    id: 'push-image'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['set', 'image', 'statefulset/flask-api', 'flask-api=docker.io/reddysaab/flask-api:$COMMIT_SHA']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=australia-southeast1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=flask-cluster'
    id: 'deploy-to-gke'
    waitFor: ['push-image']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/dockerhub-password/versions/latest
    env: DOCKERHUB_PASSWORD

options:
  logging: CLOUD_LOGGING_ONLY
